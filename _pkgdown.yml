url: https://zohebkhan1.github.io/encodeUtils/
destination: site

template:
  bootstrap: 5
  light-switch: true
  theme: a11y-light
  theme-dark: a11y-dark
  bslib:
    bg: "#fafaf7"
    fg: "#1f2a24"
    primary: "#4f7d62"
    secondary: "#6e7b72"
    link-color: "#2f7457"
    border-color: "#d9dfd7"
    body-color: "#1f2a24"
    body-bg: "#fafaf7"
    code-color: "#2e6f52"
    code-bg: "#edf3ee"
    navbar-light-bg: "#f5f7f2"
    navbar-dark-bg: "#171d19"
    navbar-padding-y: "0.58rem"
    border-radius: "0.32rem"
    btn-border-radius: "0.25rem"
    grid-gutter-width: "2.4rem"
    pkgdown-nav-height: "58px"
    base_font: { google: "Roboto" }
    heading_font: { google: "Roboto" }
    code_font: { google: "Source Code Pro" }

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github, lightswitch]
  components:
    intro:
      text: Get started
      href: articles/get-started.html

home:
  title: Query and download ENCODE data from R

reference:
  - title: Package overview
    contents:
      - encodeUtils-package

  - title: Search and inspect ENCODE
    desc: Find experiments, files, metadata reports, and one-record summaries.
    contents:
      - encode_search
      - encode_get
      - encode_matrix
      - encode_report
      - encode_results

  - title: Work with ENCODE files
    desc: List, select, preview, download, and read files.
    contents:
      - encode_list_files
      - encode_select_files
      - encode_explain_selection
      - encode_preview_download
      - encode_download
      - encode_read

  - title: Reproducibility and attribution
    desc: Create citation tables and reproducibility manifests.
    contents:
      - encode_cite
      - encode_manifest

articles:
  - title: Start here
    navbar: ~
    contents:
      - get-started
      - encodeUtils
