url: https://zohebkhan1.github.io/encodeUtils/
destination: site

template:
  bootstrap: 5
  light-switch: true
  theme: github-light
  theme-dark: github-dark
  bslib:
    bg: "#fbfcfd"
    fg: "#18222f"
    primary: "#c45f1b"
    secondary: "#5d6f80"
    link-color: "#b85619"
    border-color: "#d9e2ea"
    body-color: "#18222f"
    body-bg: "#fbfcfd"
    code-color: "#934713"
    code-bg: "#fff3e8"
    navbar-light-bg: "#f7fafb"
    navbar-dark-bg: "#101820"
    navbar-padding-y: "0.9rem"
    border-radius: "0.4rem"
    btn-border-radius: "0.3rem"
    grid-gutter-width: "3rem"
    pkgdown-nav-height: "78px"
    base_font: { google: "Roboto" }
    heading_font: { google: "Roboto" }
    code_font: { google: "Source Code Pro" }

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github, lightswitch]
  components:
    intro:
      text: Get started
      href: articles/get-started.html

home:
  title: Query and download ENCODE data from R

reference:
  - title: Package overview
    contents:
      - encodeUtils-package

  - title: Search and inspect ENCODE
    desc: Find experiments, files, metadata reports, and one-record summaries.
    contents:
      - encode_search
      - encode_get
      - encode_matrix
      - encode_report
      - encode_results

  - title: Work with ENCODE files
    desc: List, select, preview, download, and read files.
    contents:
      - encode_list_files
      - encode_select_files
      - encode_explain_selection
      - encode_preview_download
      - encode_download
      - encode_read

  - title: Reproducibility and attribution
    desc: Create citation tables and reproducibility manifests.
    contents:
      - encode_cite
      - encode_manifest

articles:
  - title: Start here
    navbar: ~
    contents:
      - get-started
      - encodeUtils
